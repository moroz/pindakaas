version: "2"

sql:
  - engine: "sqlite"
    queries: "db/sql/*.sql"
    schema: "db/migrations"
    gen:
      go:
        out: "db/queries"
        emit_pointers_for_null_types: true
        emit_result_struct_pointers: true
        emit_params_struct_pointers: true

        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              package: "uuid"

          - db_type: "timestamp"
            go_type:
              import: "github.com/moroz/pindakaas/types/dbtypes"
              type: "UnixTimestamp"
          - db_type: "timestamp"
            nullable: true
            go_type:
              pointer: true
              import: "github.com/moroz/pindakaas/types/dbtypes"
              type: "UnixTimestamp"

          - db_type: "user_token_context"
            go_type:
              import: "github.com/moroz/pindakaas/types/dbtypes"
              type: "UserTokenContext"
