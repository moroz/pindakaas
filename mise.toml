[tools]
go = "1.26.4"
"go:github.com/air-verse/air" = "latest"
"go:github.com/pressly/goose/v3/cmd/goose" = "v3.27.1"

[env]
SSH_SERVER_KEY_PATH = "./priv/id_ed25519"
GOOSE_MIGRATION_DIR = "db/migrations"
GOOSE_DBSTRING = "./dev.db"
GOOSE_DRIVER = "sqlite3"

[tasks.deploy]
dir = "{{ config_root }}/deploy"
run = "ansible-playbook -v deploy.yml"

[tasks."server:keygen"]
run = """
#!/usr/bin/env -S bash -euo pipefail

if [[ ! -f "$SSH_SERVER_KEY_PATH" ]]; then
  ssh-keygen -t ed25519 -f $SSH_SERVER_KEY_PATH -N ""
else
  echo "$SSH_SERVER_KEY_PATH exists, skipping..."
fi
"""
