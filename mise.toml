[tools]
age = "latest"
go = "1.26.4"
"go:filippo.io/mkcert" = "v1.4.4"
"go:github.com/air-verse/air" = "latest"
"go:github.com/pressly/goose/v3/cmd/goose" = "v3.27.1"
sqlite = "latest"

[env]
DATABASE_URL = "./db/dev.db"
SSH_SERVER_KEY_FILE = "./priv/id_ed25519"
GOOSE_MIGRATION_DIR = "db/migrations"
GOOSE_DBSTRING = "{{ env.DATABASE_URL }}"
GOOSE_DRIVER = "sqlite3"
TLS_CERT_FILE = "./priv/cert.pem"
TLS_KEY_FILE = "./priv/key.pem"
BASE_DOMAIN = "pindakaas.localhost"
TZ = "UTC"

[tasks.setup]
depends = ["keygen", "db:setup"]

[tasks.deploy]
dir = "{{ config_root }}/deploy"
run = "ansible-playbook -v deploy.yml"

[tasks."db:setup"]
run = "goose up"

[tasks."keygen.ssh"]
run = """
#!/usr/bin/env -S bash -euo pipefail

if [[ ! -f "$SSH_SERVER_KEY_FILE" ]]; then
  ssh-keygen -t ed25519 -f $SSH_SERVER_KEY_FILE -N ""
else
  echo "$SSH_SERVER_KEY_FILE exists, skipping..."
fi
"""

[tasks."keygen.tls"]
run = """
#!/usr/bin/env -S bash -euo pipefail

if [[ -f "$TLS_KEY_FILE" ]] && [[ -f "$TLS_CERT_FILE" ]]; then
  echo "TLS key and certificate file exist, skipping..."
  exit 0
fi

mkcert -key-file "$TLS_KEY_FILE" -cert-file "$TLS_CERT_FILE" "$BASE_DOMAIN" "*.$BASE_DOMAIN"
"""
